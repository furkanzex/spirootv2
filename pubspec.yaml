name: spirootv2
description: "Spiritual guidance application by APPTOIC."
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.6.0
  easy_localization: ^3.0.7
  flutter_launcher_icons: ^0.14.1
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1
  purchases_ui_flutter: ^8.1.5
  sign_in_with_apple: ^6.1.3
  google_sign_in: ^6.2.1
  fluttertoast: ^8.2.8
  google_generative_ai: ^0.4.6
  google_fonts: ^6.2.1
  flutter_onboarding_slider: ^1.0.11
  icons_plus: ^5.0.0
  lottie: ^3.1.3
  flutter_svg: ^2.0.10+1
  get: ^4.6.6
  intl: ^0.19.0
  purchases_flutter: ^8.1.6
  get_storage: ^2.1.1
  scaffold_gradient_background: ^1.0.3+1
  extended_image: ^8.2.0
  flutter_cache_manager: ^3.3.1
  carousel_slider: ^5.0.0
  url_launcher: ^6.3.1
  share: ^2.0.4
  fl_chart: ^0.69.0
  flutter_datetime_picker_plus: ^2.1.0
  google_places_flutter: ^2.0.8
  animate_do: ^3.3.4
  sweph: ^3.0.1+2.10.3
  http: ^1.1.0
  path_provider: ^2.1.1
  flutter_phoenix: ^1.1.1
  cached_network_image: ^3.4.1
  firebase_storage: ^12.3.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  remove_alpha_ios: true


flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/tarot/
    - assets/translations/
    - assets/lottie/
    - assets/svg/
    - assets/json/
    - assets/translations/tr-TR.json
    - assets/translations/en-US.json
